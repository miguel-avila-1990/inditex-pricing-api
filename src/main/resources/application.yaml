server:
  port: 8080

spring:
  application:
    name: pricing-api

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
    platform: h2

  jpa:
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
